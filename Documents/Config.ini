; ConBox configuration file
; Section headers are visual only -- keys are matched by name, not section.

[font]
efont_name    = Cascadia Mono
efont_size    = 12
efont_opts    =
kfont_name    = Malgun Gothic
kfont_size    = 0
kfont_opts    = B

[layout]
margin_top    = 10
margin_left   = 10
margin_bottom = 10
margin_right  = 10
adjust_left   = 0
adjust_top    = 0
adjust_right  = 0
adjust_bottom = 0
grid_cols     = 96
grid_rows     = 32

[colors]
fg = #C8C8C8
bg = #202020

[cursor]
cursor_type     = 0
cursor_blend_bg = 4
cursor_blend_fg = 6
cursor_blink_ms = 0

[rendering]
builtin_glyphs = 1
scrollback_cap = 5000

[child]
cmdline = powershell.exe
