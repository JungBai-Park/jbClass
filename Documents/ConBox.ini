; ConBox 설정 파일
; 섹션 이름은 무시됩니다 -- 키 이름으로만 인식합니다.

[font]
; 폰트 크기는 포인트(pt) 단위. opts: B=굵게, I=기울임, 90W=너비 90%
efont_name    = Cascadia Mono   ; 영문 폰트 이름
efont_size    = 12              ; 영문 폰트 크기 (포인트)
efont_opts    =                 ; 영문 폰트 옵션
kfont_name    = Malgun Gothic   ; 한글 폰트 이름
kfont_size    = 0               ; 0 이하: 영문 높이에 맞춤 / 양수: 크기 직접 지정
kfont_opts    = B               ; 한글 폰트 옵션

[layout]
; 마진: 콘텐츠와 창 가장자리 사이 여백(px). adjust: 셀 크기 미세조정(px, 음수=줄임)
margin_top    = 10              ; 위쪽 여백
margin_left   = 10              ; 왼쪽 여백
margin_bottom = 10              ; 아래쪽 여백
margin_right  = 10              ; 오른쪽 여백
adjust_left   = 0               ; 셀 왼쪽 패딩
adjust_top    = -2              ; 셀 위쪽 패딩
adjust_right  = 0               ; 셀 오른쪽 패딩
adjust_bottom = 0               ; 셀 아래쪽 패딩
grid_cols     = 96              ; 가로 칸 수
grid_rows     = 32              ; 세로 줄 수

[screen]
; 색상 형식: #RRGGBB
screen_text       = #C8C8C8     ; 기본 글자색
screen_back       = #202020     ; 기본 배경색
; ANSI 16색 팔레트 (SGR 30~37/90~97 색상, 0-indexed)
screen_palette00  = #000000     ; 검정
screen_palette01  = #CD0000     ; 빨강
screen_palette02  = #00CD00     ; 초록
screen_palette03  = #CDCD00     ; 노랑
screen_palette04  = #0000EE     ; 파랑
screen_palette05  = #CD00CD     ; 자홍
screen_palette06  = #00CDCD     ; 청록
screen_palette07  = #E5E5E5     ; 흰색(밝은)
screen_palette08  = #7F7F7F     ; 회색(밝은 검정)
screen_palette09  = #FF0000     ; 밝은 빨강
screen_palette10  = #00FF00     ; 밝은 초록
screen_palette11  = #FFFF00     ; 밝은 노랑
screen_palette12  = #5C5CFF     ; 밝은 파랑
screen_palette13  = #FF00FF     ; 밝은 자홍
screen_palette14  = #00FFFF     ; 밝은 청록
screen_palette15  = #FFFFFF     ; 흰색

[paper]
; EMF/PDF 출력용 색상
paper_text        = #000000
paper_back        = #FFFFFF
paper_palette00   = #FFFFFF
paper_palette01   = #CC0000
paper_palette02   = #4E9A06
paper_palette03   = #C4A000
paper_palette04   = #3465A4
paper_palette05   = #75507B
paper_palette06   = #06989A
paper_palette07   = #000000
paper_palette08   = #EEEEEE
paper_palette09   = #CC0000
paper_palette10   = #4E9A06
paper_palette11   = #C4A000
paper_palette12   = #3465A4
paper_palette13   = #75507B
paper_palette14   = #06989A
paper_palette15   = #000000
lines_per_paper   = 50         ; EMF 그림 한장에 표시되는 줄 수

[cursor]
; 커서 모양: 홀수=깜빡임, 짝수=고정
cursor_type     = 0             ; 0=기본(3), 1=깜빡블록, 2=고정블록, 3=깜빡밑줄, 4=고정밑줄, 5=깜빡I빔, 6=고정I빔
cursor_blend_bg = 4             ; 커서 색상 - 배경색 비중
cursor_blend_fg = 6             ; 커서 색상 - 글자색 비중
cursor_blink_ms = 0             ; 깜빡임 간격(ms). 0 = 시스템 설정 따름

[rendering]
builtin_glyphs = 2              ; 0=폰트, 1=블록문자 직접그림, 2=박스선까지 직접그림(기본)
scrollback_cap = 5000           ; 스크롤백 최대 줄 수

[child]
cmdline = cmd.exe               ; 실행할 자식 프로세스 명령줄 (비워두면 자동 실행 안함)
